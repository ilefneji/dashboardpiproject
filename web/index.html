<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Project PI - Construction Dashboard">
  <meta name="theme-color" content="#3a82d6">
  <meta name="google-signin-client_id" content="272451779584-k60dr2nllicm1kjn93ro0kfku5u6k8id.apps.googleusercontent.com">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Project PI">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  
  <title>PI Project </title>
  <link rel="manifest" href="manifest.json">
  
  <!-- Lottie Animation Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>

  <style>
    /* CSS Reset and Base Styles */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary-color: #ff6600;
      --primary-dark: #927c19;
      --text-primary: #2c3e50;
      --text-secondary: #64748b;
      --bg-gradient: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
      --animation-timing: 0.5s;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }

    /* Loading Screen Container */
    .loading-container {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg-gradient);
      transition: opacity var(--animation-timing) ease-in-out;
    }

    /* Loading Content Card */
    .loading-content {
      position: relative;
      width: min(90%, 360px);
      padding: 2.5rem;
      background: rgba(255, 255, 255, 0.98);
      border-radius: 24px;
      box-shadow: 
        0 20px 40px rgba(0, 0, 0, 0.1),
        0 0 0 1px rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      transform-origin: center;
      animation: cardEntrance var(--animation-timing) cubic-bezier(0.21, 1.02, 0.73, 1) forwards;
    }

    /* Project Title */
    .project-title {
      font-size: clamp(1.8rem, 5vw, 2.2rem);
      font-weight: 700;
      color: var(--primary-color);
      text-align: center;
      margin-bottom: 2rem;
      letter-spacing: -0.02em;
      position: relative;
    }

    .project-title::after {
      content: '';
      position: absolute;
      bottom: -0.5rem;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 4px;
      background: var(--bg-gradient);
      border-radius: 2px;
    }

    /* Lottie Animation Container */
    .lottie-container {
      width: 180px;
      height: 180px;
      margin: 1rem auto;
      filter: drop-shadow(0 4px 12px rgba(58, 130, 214, 0.2));
    }

    /* Loading Messages */
    .loading-message {
      text-align: center;
      color: var(--text-primary);
      font-size: 1.1rem;
      font-weight: 500;
      margin-top: 1.5rem;
    }

    .loading-subtitle {
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-top: 0.5rem;
      opacity: 0.8;
    }

    /* Animations */
    @keyframes cardEntrance {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes cardExit {
      to {
        opacity: 0;
        transform: translateY(-20px) scale(0.95);
      }
    }

    /* State Classes */
    .loading-container.hide {
      opacity: 0;
      pointer-events: none;
    }

    .loading-content.hide {
      animation: cardExit var(--animation-timing) cubic-bezier(0.21, 1.02, 0.73, 1) forwards;
    }

    /* Responsive Design */
    @media (max-width: 480px) {
      .loading-content {
        padding: 2rem;
      }
      .lottie-container {
        width: 140px;
        height: 140px;
      }
      .loading-message {
        font-size: 1rem;
      }
      .loading-subtitle {
        font-size: 0.875rem;
      }
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen" class="loading-container">
    <div class="loading-content">
      <h1 class="project-title"> PI Project </h1>
      <div id="lottie-animation" class="lottie-container"></div>
      <p class="loading-message">Veuillez patienter pendant le chargement de l'application...</p>
      <p class="loading-subtitle">Chargement...</p>
    </div>
  </div>

  <script>
    (() => {
      // Configuration
      const CONFIG = {
        ANIMATION_SPEED: 1.2,
        HIDE_ANIMATION_DURATION: 800
      };

      // State Management
      const state = {
        isFlutterReady: false,
        animation: null
      };

      // DOM Elements
      const elements = {
        loadingScreen: document.getElementById('loading-screen'),
        loadingContent: document.querySelector('.loading-content'),
        lottieContainer: document.getElementById('lottie-animation')
      };

      // Initialize Lottie Animation
      function initializeLottieAnimation() {
        try {
          console.log('🔄 Initializing Lottie animation...');
          
          if (!elements.lottieContainer) {
            throw new Error('Lottie container element not found');
          }

          if (typeof lottie === 'undefined') {
            throw new Error('Lottie library not loaded');
          }

          fetch('assets/loader.json')
            .then(response => {
              if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
              }
              return response.json();
            })
            .then(animationData => {
              state.animation = lottie.loadAnimation({
                container: elements.lottieContainer,
                renderer: 'svg',
                loop: true,
                autoplay: true,
                animationData: animationData,
                rendererSettings: {
                  progressiveLoad: true,
                  preserveAspectRatio: 'xMidYMid meet',
                  clearCanvas: true
                }
              });

              state.animation.addEventListener('DOMLoaded', () => {
                console.log('🎨 Lottie animation loaded successfully');
                state.animation.setSpeed(CONFIG.ANIMATION_SPEED);
              });

              state.animation.addEventListener('error', handleAnimationError);
            })
            .catch(handleAnimationError);

        } catch (error) {
          handleAnimationError(error);
        }
      }

      // Error Handling
      function handleAnimationError(error) {
        console.error('❌ Animation error:', error);
        if (elements.lottieContainer) {
          elements.lottieContainer.innerHTML = `
            <div style="
              font-size: 24px; 
              color: var(--primary-color);
              display: flex;
              align-items: center;
              justify-content: center;
              height: 100%;
            ">
              <div class="loading-fallback">
                Chargement...
              </div>
            </div>
          `;
        }
      }

      // Hide Loading Screen
      function hideLoadingScreen() {
        if (!elements.loadingScreen || !elements.loadingContent) return;
        
        console.log('✨ Flutter is ready, hiding loading screen');
        
        elements.loadingScreen.classList.add('hide');
        elements.loadingContent.classList.add('hide');

        // Clean up animation after transition
        setTimeout(() => {
          if (state.animation) {
            state.animation.destroy();
          }
          elements.loadingScreen.style.display = 'none';
        }, CONFIG.HIDE_ANIMATION_DURATION);
      }

      // Event Handlers
      function handleFlutterFirstFrame() {
        console.log('🎯 Flutter first frame received');
        state.isFlutterReady = true;
        hideLoadingScreen();
      }

      // Initialize
      function initialize() {
        initializeLottieAnimation();
        window.addEventListener('flutter-first-frame', handleFlutterFirstFrame);
      }

      // Start when DOM is ready
      document.addEventListener('DOMContentLoaded', initialize);
    })();
  </script>

  <!-- Flutter Bootstrap -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
