name: constructiondashboard
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.8.0
  webview_flutter_web: ^0.2.2+4
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  dio: ^5.4.0
  dio_smart_retry: ^6.0.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.4
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  google_sign_in: ^7.2.0
  google_fonts: ^8.1.0
  flutter_svg: ^2.0.9
  intl: any
  url_launcher: ^6.2.5
  path_provider: ^2.1.2
  file_picker: ^10.3.7
  http: ^1.2.0
  flutter_stripe: ^10.1.1

  # map
  flutter_osm_plugin: 1.4.6
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  flutter_localizations:
    sdk: flutter

  pointer_interceptor: ^0.10.1+2
  fl_chart: ^0.66.2

dev_dependencies:
